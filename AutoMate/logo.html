<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      .hero {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0e0e10;
      }

      .automate-logo {
        display: flex;
        align-items: center;
        font-size: 90px;
        font-weight: 700;
        color: #f4f4f4;
        letter-spacing: 6px;
        font-family: "Inter";
      }

      .letter {
        margin: 0 4px;
      }
      .wheel {
        width: 85px;
        height: 85px;
        border: 6px solid #b87363;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 6px;
        position: relative;
        animation: spin 6s linear infinite;
      }

      .spokes {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: 4px solid transparent;
        border-top: 4px solid #b87363;
        border-bottom: 4px solid #b87363;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }
      .robot {
        margin: 0 8px;
        position: relative;
        top: -20px;
      }

      .robot-head {
        width: 50px;
        height: 40px;
        border-radius: 10px;
        background: #1a1a1f;
        border: 2px solid #3a3a40;
        display: flex;
        align-items: center;
        justify-content: space-evenly;
      }

      .eye {
        width: 8px;
        height: 8px;
        background: #222;
        border-radius: 50%;
        opacity: 0;
      }
      .eye {
        animation: boot 1.5s ease forwards;
        animation-delay: 1.2s;
      }

      @keyframes boot {
        0% {
          opacity: 0;
          transform: scale(0.3);
        }

        50% {
          opacity: 1;
          background: #00f0ff;
          box-shadow: 0 0 10px #00f0ff;
        }

        100% {
          opacity: 1;
          background: #00f0ff;
        }
      }
      .automate-logo::after {
        content: "";
        position: absolute;

        width: 400px;
        height: 200px;

        background: radial-gradient(circle, #b8736330, transparent);

        filter: blur(80px);

        z-index: -1;
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <div class="automate-logo">
        <span class="letter">A</span>
        <span class="letter">U</span>
        <span class="letter">T</span>

        <div class="wheel">
          <div class="spokes"></div>
        </div>

        <span class="letter">M</span>
        <span class="letter">A</span>

        <div class="robot">
          <div class="robot-head">
            <div class="eye left"></div>
            <div class="eye right"></div>
          </div>
        </div>

        <span class="letter">E</span>
      </div>
    </section>
  </body>
</html>
